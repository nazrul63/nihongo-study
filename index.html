<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#17171d" />
  <title>にほんご Study</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function(){
      const t = localStorage.getItem('nhk_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<!-- ═══════════ LOGIN SCREEN ═══════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">に<span>ほ</span>んご</div>
    <h1 class="login-title">Minna no Nihongo</h1>
    <p class="login-sub">Personal study site · Sign in to sync across all your devices</p>
    <button id="google-btn" class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
    <p class="login-note">Your progress is saved privately to your Google account.<br>Share this URL with friends — everyone gets their own progress.</p>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div class="app-shell">

  <header>
    <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="logo">に<span>ほ</span>んご</div>
    <div class="logo-sub">Minna no Nihongo</div>
    <div class="header-right">
      <div class="overall-bar">
        <div class="overall-fill" id="overall-fill" style="width:0%"></div>
      </div>
      <span id="overall-label">0%</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <div id="user-area"></div>
    </div>
  </header>

  <!-- Sidebar overlay (mobile tap-to-close) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <aside id="sidebar">
    <div class="sb-lessons">
      <div class="sb-label" style="margin-bottom:6px">Overview</div>
      <button class="lesson-btn" id="repo-btn" onclick="openRepository();closeSidebar()" style="margin-bottom:10px">
        <span class="lesson-num" style="font-size:16px;background:rgba(124,58,237,.15)">📚</span>
        <span>
          <span style="display:block;font-size:13px">Repository</span>
          <span style="display:block;font-size:11px;color:var(--hint)">All vocab · kanji · grammar</span>
        </span>
      </button>
      <div class="sb-label" style="margin-bottom:6px">Lessons</div>
      <div id="lesson-list"></div>
    </div>

    <div class="sync-panel">
      <div class="sync-label">Local backup</div>
      <div class="sync-row">
        <button class="sync-btn" onclick="exportProgress()">⬇ Export</button>
        <label class="sync-btn" style="cursor:pointer">
          ⬆ Import
          <input type="file" accept=".json" onchange="importProgress(event)" style="display:none" />
        </label>
      </div>
      <div class="sync-msg" id="sync-msg"></div>
    </div>
  </aside>

  <main>
    <div class="lesson-header">
      <div class="lesson-title" id="lesson-title">—</div>
      <div class="lesson-topic" id="lesson-topic"></div>
      <div class="grammar-pill"  id="lesson-grammar"></div>
    </div>
    <div id="mode-tabs-wrap">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard" onclick="switchMode('flashcard')">🃏 Flashcards</button>
        <button class="mode-tab" data-mode="kanji"     onclick="switchMode('kanji')">漢字 Kanji</button>
        <button class="mode-tab" data-mode="sentences" onclick="switchMode('sentences')">💬 Sentences</button>
        <button class="mode-tab" data-mode="quiz"      onclick="switchMode('quiz')">✏️ Quiz</button>
        <button class="mode-tab" data-mode="list"      onclick="switchMode('list')">📋 Word list</button>
      </div>
    </div>
    <div id="mode-area"></div>
  </main>

</div><!-- /app-shell -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- LOAD ORDER: config → registry → lessons → auth → app -->
<script src="js/firebase-config.js"></script>
<script src="js/registry.js"></script>
<script src="data/lesson00.js"></script>
<script src="data/lesson01.js"></script>
<script src="data/lesson02.js"></script>
<script src="data/lesson03.js"></script>
<!-- <script src="data/lesson04.js"></script> -->
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
  /* ── Sidebar (mobile) ── */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('visible');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('visible');
  }
  /* Close sidebar when a lesson is selected on mobile */
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('lesson-list').addEventListener('click', () => {
      if (window.innerWidth < 700) closeSidebar();
    });
  });
</script>
</body>
</html>
