<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>にほんご Study — Minna no Nihongo</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function(){
      const t = localStorage.getItem('nhk_theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
<div class="app-shell">

  <header>
    <div class="logo">に<span>ほ</span>んご</div>
    <div class="logo-sub">Minna no Nihongo — Personal Study</div>
    <div class="header-right">
      <div class="overall-bar">
        <div class="overall-fill" id="overall-fill" style="width:0%"></div>
      </div>
      <span id="overall-label">0% mastered</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    </div>
  </header>

  <aside>
    <div class="sb-lessons">
      <div class="sb-label" style="margin-bottom:6px">Overview</div>
      <button class="lesson-btn" id="repo-btn" onclick="openRepository()" style="margin-bottom:10px">
        <span class="lesson-num" style="font-size:16px;background:rgba(124,58,237,.15)">📚</span>
        <span><span style="display:block;font-size:13px">Repository</span>
        <span style="display:block;font-size:11px;color:var(--hint)">All vocab · kanji · grammar</span></span>
      </button>
      <div class="sb-label" style="margin-bottom:6px">Lessons</div>
      <div id="lesson-list"></div>
    </div>

    <!-- Progress sync panel -->
    <div class="sync-panel">
      <div class="sync-label">Progress sync</div>
      <div class="sync-row">
        <button class="sync-btn" onclick="exportProgress()" title="Download progress as file">⬇ Export</button>
        <label class="sync-btn" title="Restore progress from file" style="cursor:pointer">
          ⬆ Import
          <input type="file" accept=".json" onchange="importProgress(event)" style="display:none" />
        </label>
      </div>
      <div class="sync-msg" id="sync-msg"></div>
    </div>
  </aside>

  <main>
    <div class="lesson-header">
      <div class="lesson-title" id="lesson-title">—</div>
      <div class="lesson-topic" id="lesson-topic"></div>
      <div class="grammar-pill"  id="lesson-grammar"></div>
    </div>
    <div id="mode-tabs-wrap">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="flashcard" onclick="switchMode('flashcard')">🃏 Flashcards</button>
        <button class="mode-tab" data-mode="kanji"     onclick="switchMode('kanji')">漢字 Kanji</button>
        <button class="mode-tab" data-mode="sentences" onclick="switchMode('sentences')">💬 Sentences</button>
        <button class="mode-tab" data-mode="quiz"      onclick="switchMode('quiz')">✏️ Quiz</button>
        <button class="mode-tab" data-mode="list"      onclick="switchMode('list')">📋 Word list</button>
      </div>
    </div>
    <div id="mode-area"></div>
  </main>

</div>

<!-- LOAD ORDER: registry → lesson data → app (do not reorder) -->
<script src="js/registry.js"></script>
<script src="data/lesson01.js"></script>
<script src="data/lesson02.js"></script>
<script src="data/lesson03.js"></script>
<script src="js/app.js"></script>
</body>
</html>
